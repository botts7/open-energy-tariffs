<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>open-energy-tariffs · coverage map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root { --ink: #1a2233; --line: #e2e8f0; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: var(--ink); }
    #app { display: flex; flex-direction: column; height: 100%; }
    header { padding: 9px 16px; background: #0f172a; color: #fff; }
    header h1 { font-size: 15px; margin: 0; font-weight: 650; }
    header p { margin: 2px 0 0; font-size: 12px; color: #94a3b8; }
    #main { display: flex; flex: 1; min-height: 0; }
    #sidebar { width: 320px; flex: none; overflow-y: auto; background: #fff; border-right: 1px solid var(--line); padding: 10px 12px; font-size: 13px; }
    #map { flex: 1; }
    .sb-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .sb-count { font-size: 12px; color: #64748b; }
    .sb-input, .sb-num { padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; }
    .sb-input { width: 100%; margin-bottom: 8px; }
    .sb-num { width: 64px; }
    .sb-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; }
    .sb-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #94a3b8; width: 100%; }
    .sb-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border: 1px solid var(--line); border-radius: 999px; cursor: pointer; }
    .sb-reset { padding: 5px 12px; border: 1px solid #cbd5e1; background: #f8fafc; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 10px; }
    .sb-list { border-top: 1px solid var(--line); }
    .sb-row { display: flex; gap: 8px; padding: 7px 4px; border-bottom: 1px solid #f1f5f9; cursor: pointer; align-items: flex-start; }
    .sb-row:hover { background: #f8fafc; }
    .sb-nolocate { opacity: .55; }
    .sb-sw { width: 12px; height: 12px; border-radius: 3px; margin-top: 3px; flex: none; border: 1px solid rgba(0,0,0,.2); }
    .sb-title { line-height: 1.25; }
    .sb-sub { font-size: 11px; color: #64748b; margin-top: 1px; }
    .sb-more { padding: 8px 4px; font-size: 12px; color: #94a3b8; }
    .sb-cmp { margin: 4px 0 10px; border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; }
    .sb-cmp summary { cursor: pointer; font-size: 12px; font-weight: 600; color: #2563eb; }
    .sb-cmp .sb-chips { margin-top: 8px; }
    .sb-best { background: #16a34a; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 999px; margin-left: 6px; }
    .sb-cur { background: #2563eb; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 999px; margin-left: 6px; }
    .sb-bestrow { background: #f0fdf4; }
    .sb-currow { background: #eff6ff; }
    .sb-save { color: #16a34a; font-weight: 600; }
    .sb-cost { color: #dc2626; }
    .sb-baseline { background: #fef9c3; border: 1px solid #fde68a; border-radius: 6px; padding: 6px 8px; font-size: 12px; margin-bottom: 6px; }
    .oet-legend { background: #fff; padding: 8px 10px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.3); font-size: 12px; line-height: 1.7; }
    .oet-legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 6px; vertical-align: -1px; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>open-energy-tariffs — coverage map</h1>
      <p>Browse + filter electricity plans; areas shaded by rate. Click a plan to zoom to its coverage.</p>
    </header>
    <div id="main">
      <aside id="sidebar"></aside>
      <div id="map"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6.0.4/dist/d3-delaunay.min.js"
          integrity="sha384-VOXGNLi40onWvNCRY7SBRxwhW7EPHDfwmHWrQ5cNblbDOBlxq2jpuCizi4/ajTCD"
          crossorigin="anonymous"></script>
  <script src="sample.js"></script>
  <script src="au-postcodes.js"></script>
  <script src="world-countries.js"></script>
  <script src="provinces.js"></script>
  <!-- au-suburbs.js (276KB, suburb search only) is lazy-loaded after first paint -->

  <script src="geo.js"></script>
  <script src="boundaries.js"></script>
  <script src="polygons.js"></script>
  <script src="data.js"></script>
  <script src="cost.js"></script>
  <script src="bill-pdf.js"></script>
  <script src="render.js"></script>
  <script src="sidebar.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () { OET.main(); });
  </script>
</body>
</html>
