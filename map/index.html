<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>open-energy-tariffs · coverage map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root { --ink: #1a2233; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: var(--ink); }
    #app { display: flex; flex-direction: column; height: 100%; }
    header { padding: 10px 16px; background: #0f172a; color: #fff; }
    header h1 { font-size: 16px; margin: 0; font-weight: 650; }
    header p { margin: 2px 0 0; font-size: 12px; color: #94a3b8; }
    .bar { display: flex; gap: 8px; align-items: center; padding: 8px 16px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
    .bar input { padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; min-width: 220px; }
    .bar button { padding: 6px 12px; border: 0; border-radius: 6px; background: #2563eb; color: #fff; font-size: 13px; cursor: pointer; }
    .bar #info { font-size: 12px; color: #475569; margin-left: auto; }
    #map { flex: 1; }
    .oet-legend { background: #fff; padding: 8px 10px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.3); font-size: 12px; line-height: 1.7; }
    .oet-legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 6px; vertical-align: -1px; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>open-energy-tariffs — coverage map</h1>
      <p>Electricity plans plotted by their <code>meta.coverage</code>. Demo data; markers coloured by rate.</p>
    </header>
    <div class="bar">
      <input id="q" type="search" placeholder="What's in my area? postcode, GSP, region, provider…" aria-label="filter" />
      <button id="clear" type="button">Clear</button>
      <span id="info">loading…</span>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="sample.js"></script>
  <script src="geo.js"></script>
  <script src="boundaries.js"></script>
  <script src="data.js"></script>
  <script src="render.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      OET.main();
      var q = document.getElementById('q');
      q.addEventListener('input', function () { if (OET.applyFilter) OET.applyFilter(q.value); });
      document.getElementById('clear').addEventListener('click', function () {
        q.value = ''; if (OET.applyFilter) OET.applyFilter('');
      });
    });
  </script>
</body>
</html>
