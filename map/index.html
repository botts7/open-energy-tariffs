<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>open-energy-tariffs · coverage map</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --bg:#f1f5f9; --panel:#fff; --text:#1a2233; --muted:#64748b; --border:#e2e8f0;
      --hover:#f8fafc; --input-bd:#cbd5e1; --input-bg:#fff; --chip:#f8fafc;
      --header:#0f172a; --header-text:#fff; --accent:#2563eb; --ink:#1a2233; --line:#e2e8f0;
      --font-display:'Sora', system-ui, sans-serif; --font-mono:'JetBrains Mono', ui-monospace, monospace;
    }
    html[data-theme="dark"] {
      --bg:#0b1220; --panel:#111827; --text:#e5e7eb; --muted:#94a3b8; --border:#1f2937;
      --hover:#1e293b; --input-bd:#374151; --input-bg:#0b1220; --chip:#1e293b;
      --header:#0b1220; --header-text:#f1f5f9; --accent:#60a5fa; --ink:#e5e7eb; --line:#1f2937;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: var(--text); background: var(--bg); }
    #app { display: flex; flex-direction: column; height: 100%; }
    header { display:flex; align-items:center; gap:14px; padding:9px 16px; background:linear-gradient(180deg,#0d1526,#0b1220); color:var(--header-text); border-bottom:3px solid; border-image:linear-gradient(90deg,#16a34a,#eab308,#f97316,#dc2626) 1; }
    .brand { display:flex; align-items:center; gap:10px; flex:none; min-width:0; text-decoration:none; color:inherit; }
    .brand img { filter:drop-shadow(0 0 10px rgba(234,179,8,.35)); }
    .brand-name { font-family:var(--font-display); font-size:18px; font-weight:800; letter-spacing:-.01em; line-height:1.05; }
    .brand-name b { color:#eab308; font-weight:800; }
    .brand-tag { font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:#64748b; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .hdr-btn { flex:none; background:rgba(255,255,255,.04); color:var(--header-text); border:1px solid #2a3a52; border-radius:9px; width:36px; height:36px; font-size:16px; cursor:pointer; line-height:1; transition:background .15s,border-color .15s; }
    .hdr-btn:hover { background:#1e293b; border-color:#3b4f6b; }
    #navToggle { display:none; }
    /* primary destinations — always visible, labelled */
    .primary-nav { display:flex; gap:4px; flex:none; background:rgba(255,255,255,.04); border:1px solid #2a3a52; border-radius:11px; padding:3px; }
    .navitem { display:flex; align-items:center; gap:7px; background:transparent; color:#cbd5e1; border:none; padding:7px 14px; font-family:var(--font-display); font-size:13px; font-weight:600; border-radius:8px; cursor:pointer; white-space:nowrap; transition:background .15s,color .15s; }
    .navitem:hover { color:#fff; background:rgba(255,255,255,.06); }
    .navitem.on { color:#0b1220; background:linear-gradient(180deg,#fde047,#eab308); box-shadow:0 1px 8px rgba(234,179,8,.35); }
    .navitem .ni-i { font-size:14px; }
    .utilcluster { display:flex; align-items:center; gap:8px; flex:none; }
    .cta { display:flex; align-items:center; gap:8px; font-family:var(--font-display); font-weight:700; font-size:13px; color:#fff; background:linear-gradient(180deg,#3b82f6,#2563eb); border:none; border-radius:10px; padding:8px 15px; cursor:pointer; box-shadow:0 2px 12px rgba(37,99,235,.4); transition:transform .12s,box-shadow .15s; }
    .cta:hover { transform:translateY(-1px); box-shadow:0 4px 18px rgba(37,99,235,.55); }
    #tableview { flex:1; display:none; flex-direction:column; overflow:hidden; background:var(--bg); }
    .tv-bar { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; padding:8px 12px; border-bottom:1px solid var(--border); font-size:12px; color:var(--muted); }
    .tv-warn { color:#b45309; }
    .tv-baseline { padding:8px 12px; background:rgba(22,163,74,.1); border-bottom:1px solid var(--border); font-size:12.5px; color:var(--text); }
    .tv-table th.tv-savehdr { color:#16a34a; }
    .tv-table td.tv-save { font-size:14px; }
    .tv-period button { background:transparent; border:1px solid var(--input-bd); color:var(--text); padding:3px 9px; border-radius:6px; cursor:pointer; font-size:12px; margin-left:4px; text-transform:capitalize; }
    .tv-period button.on { background:#2563eb; border-color:#2563eb; color:#fff; }
    .tv-scroll { overflow:auto; flex:1; }
    .tv-table { width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed; }
    .tv-table th { position:sticky; top:0; background:var(--panel); text-align:left; padding:8px 10px; border-bottom:2px solid var(--border); cursor:pointer; white-space:nowrap; color:var(--text); z-index:1; }
    .tv-table th.sorted { color:var(--accent); }
    .tv-table td { padding:7px 10px; border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; vertical-align:top; }
    .tv-table th:first-child, .tv-table td:first-child { width:34%; }
    .tv-table th:nth-child(2), .tv-table td:nth-child(2) { width:12%; }
    .tv-table tbody tr { cursor:pointer; }
    .tv-table tbody tr:hover { background:var(--hover); }
    .tv-name { white-space:normal; overflow-wrap:anywhere; }
    .tv-sub { font-size:11px; color:var(--muted); margin-top:2px; }
    .tv-cost { font-weight:700; }
    .tv-table tr.tv-best { background:rgba(22,163,74,.09); }
    .tv-badge { display:inline-block; font-size:10px; font-weight:700; color:#fff; background:#16a34a; border-radius:5px; padding:0 5px; vertical-align:middle; }
    .tv-ref { font-variant-numeric:tabular-nums; }
    .topsearch { position:relative; flex:1; max-width:480px; margin:0 2px; }
    #topSearch { width:100%; padding:9px 13px; border:1px solid #2a3a52; border-radius:10px; background:rgba(255,255,255,.05); color:var(--header-text); font-size:13px; transition:border-color .15s,background .15s; }
    #topSearch:focus { outline:none; border-color:#60a5fa; background:rgba(96,165,250,.08); }
    #topSearch::placeholder { color:#7c8aa3; }
    /* instrument-grade numbers */
    .tv-cost, .tv-save, .tv-ref, .oet-rval, .oet-rnum, .oet-rband { font-family:var(--font-mono); }
    .tv-table td:nth-child(n+3) { font-family:var(--font-mono); font-size:12.5px; }
    h2, .sb-head strong, .tv-table th, .sb-wizard { font-family:var(--font-display); }
    #topSearchDD { display:none; position:absolute; top:40px; left:0; right:0; background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,.45); max-height:62vh; overflow:auto; z-index:1500; }
    .ts-item { display:flex; justify-content:space-between; gap:10px; padding:7px 11px; cursor:pointer; border-bottom:1px solid var(--border); font-size:13px; }
    .ts-item:last-child { border-bottom:none; }
    .ts-item.on, .ts-item:hover { background:var(--hover); }
    .ts-sub { color:var(--muted); font-size:11px; white-space:nowrap; align-self:center; }
    #main { display: flex; flex: 1; min-height: 0; position:relative; }
    #sidebar { width: 320px; flex: none; display: flex; flex-direction: column; overflow: hidden; background: var(--panel); border-right: 1px solid var(--border); font-size: 13px; }
    .sb-scrollwrap { flex: 1; overflow-y: auto; min-height: 0; }
    .sb-footer { flex: none; display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); background: var(--panel); }
    .sb-footer .sb-reset { margin-bottom: 0; flex: 1; white-space: nowrap; text-align: center; }
    .sb-controls { padding: 10px 12px 6px; }
    .sb-scroll { }
    #map { flex: 1; }
    .sb-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .sb-count { font-size: 12px; color: var(--muted); }
    .sb-input, .sb-num { padding: 6px 8px; border: 1px solid var(--input-bd); border-radius: 6px; font-size: 13px; background: var(--input-bg); color: var(--text); }
    .sb-input { width: 100%; margin-bottom: 8px; }
    .sb-sugg { border: 1px solid var(--border); border-radius: 6px; margin: -4px 0 8px; overflow: hidden; background: var(--panel); }
    .sb-sugg:empty { display: none; }
    .sb-sugg-item { padding: 6px 8px; cursor: pointer; font-size: 12px; border-bottom: 1px solid var(--border); }
    .sb-sugg-item:last-child { border-bottom: none; }
    .sb-sugg-item:hover { background: var(--hover); }
    .sb-num { width: 64px; }
    .sb-numw { width: 130px; }
    .sb-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; }
    .sb-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); width: 100%; }
    .sb-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border: 1px solid var(--border); border-radius: 999px; cursor: pointer; }
    .sb-reset { padding: 5px 12px; border: 1px solid var(--input-bd); background: var(--chip); color:var(--text); border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 10px; }
    .sb-wizard { width: 100%; padding: 9px 12px; margin-bottom: 10px; border: none; border-radius: 8px; background: #2563eb; color: #fff; font-size: 13.5px; font-weight: 600; cursor: pointer; }
    .sb-wizard:hover { background: #1d4ed8; }
    .sb-active { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin: 2px 0 10px; }
    .sb-active[data-empty] { padding: 6px 8px; border-radius: 6px; background: rgba(220,38,38,.08); border: 1px solid rgba(220,38,38,.35); }
    .sb-active[data-empty]::after { content: 'No plans match — remove a filter above'; width: 100%; font-size: 11px; color: #dc2626; }
    .sb-fchip { border-color: var(--accent); background: var(--hover); cursor: pointer; }
    .sb-fchip:hover { background: rgba(37,99,235,.12); }
    .sb-fchip b { color: var(--muted); font-weight: 700; }
    .sb-clearall { padding: 3px 11px; border: 1px solid var(--accent); background: transparent; color: var(--accent); border-radius: 999px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .sb-clearall:hover { background: var(--accent); color: #fff; }
    .sb-list { border-top: 1px solid var(--border); padding: 0 12px 12px; }
    .sb-row { display: flex; gap: 8px; padding: 7px 4px; border-bottom: 1px solid var(--border); cursor: pointer; align-items: flex-start; }
    .sb-row:hover { background: var(--hover); }
    .sb-nolocate { opacity: .55; }
    .sb-sw { width: 12px; height: 12px; border-radius: 3px; margin-top: 3px; flex: none; border: 1px solid rgba(0,0,0,.2); }
    .sb-title { line-height: 1.25; }
    .sb-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .sb-more { padding: 8px 4px; font-size: 12px; color: var(--muted); }
    .sb-cmp { margin: 4px 0 10px; border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; }
    .sb-cmp summary { cursor: pointer; font-size: 12px; font-weight: 600; color: var(--accent); }
    .sb-cmp .sb-chips { margin-top: 8px; }
    .sb-best { background: #16a34a; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 999px; margin-left: 6px; }
    .sb-cur { background: #2563eb; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 999px; margin-left: 6px; }
    .sb-bestrow { background: rgba(22,163,74,.12); }
    .sb-currow { background: rgba(37,99,235,.12); }
    .sb-save { color: #16a34a; font-weight: 600; }
    .sb-cost { color: #dc2626; }
    .sb-baseline { background: rgba(234,179,8,.15); border: 1px solid rgba(234,179,8,.4); border-radius: 6px; padding: 6px 8px; font-size: 12px; margin-bottom: 6px; }
    .oet-legend { background: var(--panel); color:var(--text); padding: 8px 10px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.3); font-size: 12px; line-height: 1.7; }
    .oet-legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 6px; vertical-align: -1px; }
    .oet-dark-tiles { filter: brightness(1.45) contrast(0.9); }
    html[data-theme="dark"] .leaflet-popup-content-wrapper,
    html[data-theme="dark"] .leaflet-popup-tip { background: var(--panel); color: var(--text); }
    html[data-theme="dark"] .leaflet-popup-content a { color: var(--accent); }
    html[data-theme="dark"] .leaflet-popup-close-button { color: var(--muted) !important; }
    html[data-theme="dark"] .leaflet-bar a, html[data-theme="dark"] .leaflet-control-layers { background: var(--panel); color: var(--text); border-color: var(--border); }
    @media (max-width: 760px) {
      #navToggle { display:block; }
      .topsearch, .brand > div { display:none; } /* logo identifies it; free header space */
      header { gap:5px; padding:8px 8px; }
      .brand img { width:28px; height:28px; }
      .primary-nav { margin-left:auto; padding:2px; }
      .navitem { padding:7px 8px; }
      .navitem .ni-t, .cta .ni-t { display:none; }
      .cta { padding:8px 10px; }
      .hdr-btn { width:34px; height:34px; }
      .tv-table thead { display:none; }
      .tv-table tr { display:block; border:1px solid var(--border); border-radius:8px; margin:8px 10px; padding:4px 0; }
      .tv-table td { display:flex; justify-content:space-between; gap:12px; border:none; padding:4px 12px; white-space:normal; }
      .tv-table td[data-label]::before { content:attr(data-label); color:var(--muted); font-size:11px; font-weight:600; }
      .tv-name { display:block; font-size:14px; }
      .tv-cost { font-size:15px; }
      #sidebar { position:absolute; z-index:1200; top:0; left:0; bottom:0; width:86%; max-width:340px; box-shadow:2px 0 16px rgba(0,0,0,.45); transform:translateX(-100%); transition:transform .2s ease; }
      body.nav-open #sidebar { transform:translateX(0); }
    }
  </style>
  <script>
    (function(){ var s=localStorage.getItem('oet-theme');
      if(s) document.documentElement.setAttribute('data-theme',s);
      else if(window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme','dark'); })();
  </script>
</head>
<body>
  <div id="app">
    <header>
      <button id="navToggle" class="hdr-btn" aria-label="Show filters" title="Filters">☰</button>
      <a class="brand" href="#" title="open·energy·tariffs">
        <img src="favicon.svg" alt="" width="30" height="30" />
        <div style="min-width:0">
          <div class="brand-name">open<b>·</b>energy<b>·</b>tariffs <span id="appMat"></span></div>
          <div class="brand-tag">independent · community · no commissions</div>
        </div>
      </a>
      <nav class="primary-nav" role="tablist" aria-label="Views">
        <button data-view="map" class="navitem on" title="Coverage map"><span class="ni-i">🗺</span><span class="ni-t">Map</span></button>
        <button data-view="table" class="navitem" title="Comparison table"><span class="ni-i">▦</span><span class="ni-t">Compare</span></button>
        <button id="rankToggle" class="navitem" title="Cheapest-countries ranking"><span class="ni-i">🌍</span><span class="ni-t">Rankings</span></button>
      </nav>
      <div class="topsearch">
        <input id="topSearch" type="search" placeholder="Search country, retailer, postcode, plan…   ⌕" autocomplete="off" aria-label="Search" />
        <div id="topSearchDD"></div>
      </div>
      <div class="utilcluster">
        <button id="wizardTop" class="cta" title="Guided: location → usage → ranked plans"><span class="ni-i">✨</span><span class="ni-t">Find my best plan</span></button>
        <button id="helpToggle" class="hdr-btn" aria-label="How to use this site" title="How to use this site">?</button>
        <button id="themeToggle" class="hdr-btn" aria-label="Toggle dark mode" title="Light / dark mode">◐</button>
      </div>
    </header>
    <div id="main">
      <aside id="sidebar"></aside>
      <div id="map"></div>
      <div id="tableview"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6.0.4/dist/d3-delaunay.min.js"
          integrity="sha384-VOXGNLi40onWvNCRY7SBRxwhW7EPHDfwmHWrQ5cNblbDOBlxq2jpuCizi4/ajTCD"
          crossorigin="anonymous"></script>
  <script src="sample.js"></script>
  <script src="au-postcodes.js"></script>
  <script src="world-countries.js"></script>
  <script src="provinces.js"></script>
  <!-- au-suburbs.js (276KB, suburb search only) is lazy-loaded after first paint -->

  <script src="geo.js"></script>
  <script src="boundaries.js"></script>
  <script src="polygons.js"></script>
  <script src="poa.js"></script>
  <script src="geocode.js"></script>
  <script src="data.js"></script>
  <script src="fx.js"></script>
  <script src="income.js"></script>
  <script src="baseline.js"></script>
  <script src="baseline-us.js"></script>
  <script src="baseline-logic.js"></script>
  <script src="maturity.js"></script>
  <script src="freshness.js"></script>
  <script src="cost.js"></script>
  <script src="bill-pdf.js"></script>
  <script src="render.js"></script>
  <script src="modal.js"></script>
  <script src="guide.js"></script>
  <script src="ranking.js"></script>
  <script src="universal-search.js"></script>
  <script src="table.js"></script>
  <script src="wizard.js"></script>
  <script src="selftest.js"></script>
  <script src="sidebar.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var root = document.documentElement;
      Promise.resolve(OET.main()).then(function () {
        if (OET.setMapTheme) OET.setMapTheme(root.getAttribute('data-theme') === 'dark');
      });
      var tt = document.getElementById('themeToggle');
      if (tt) tt.addEventListener('click', function () {
        var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next); localStorage.setItem('oet-theme', next);
        if (OET.setMapTheme) OET.setMapTheme(next === 'dark');
      });
      var nt = document.getElementById('navToggle');
      if (nt) nt.addEventListener('click', function () { document.body.classList.toggle('nav-open'); });
      var mp = document.getElementById('map');
      if (mp) mp.addEventListener('click', function () { document.body.classList.remove('nav-open'); });
      var hb = document.getElementById('helpToggle');
      if (hb) hb.addEventListener('click', function () { if (OET.showGuide) OET.showGuide(); });
      var rb = document.getElementById('rankToggle');
      if (rb) rb.addEventListener('click', function () { if (OET.showRanking) OET.showRanking(); });
      var wt = document.getElementById('wizardTop');
      if (wt) wt.addEventListener('click', function () { if (OET.showWizard) OET.showWizard(); });
      var am = document.getElementById('appMat');
      if (am && OET.maturityPill) am.innerHTML = OET.maturityPill(OET.FEATURE_MATURITY.app);
      if (OET.initUniversalSearch) OET.initUniversalSearch();
      document.querySelectorAll('[data-view]').forEach(function (b) {
        b.addEventListener('click', function () { if (OET.setView) OET.setView(b.dataset.view); });
      });
      if (OET.maybeAutoGuide) OET.maybeAutoGuide();
    });
  </script>
</body>
</html>
