name: submission
on:
  pull_request:
    paths: ['sources/**']
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci || npm install --no-audit --no-fund
      - run: node scripts/validate-submission.mjs
